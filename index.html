<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reColor | O výrobě reklamy</title>
    <meta name="description" content="reColor, František Diblík. Kontakt pro výrobu reklamy, grafiku, tisk a polepy." />
    <meta name="author" content="reColor" />
    <meta name="theme-color" content="#18a7b5" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link rel="canonical" href="https://www.recolor.cz/" />
    <link rel="icon" href="/reColor_v1.png" type="image/png" />
    <style>
      :root {
        --brand: #18a7b5;
        --ink: #19333f;
        --muted: #5f6f78;
        --line: rgba(25, 51, 63, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(24, 167, 181, 0.18), transparent 30%),
          linear-gradient(180deg, #f8fbfb 0%, #eef3f2 100%);
      }

      main {
        min-height: 100vh;
        width: min(calc(100% - 2rem), 960px);
        margin: 0 auto;
        display: grid;
        place-items: center;
        padding: 3rem 0;
      }

      .card {
        width: 100%;
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid var(--line);
        border-radius: 32px;
        padding: clamp(2rem, 6vw, 4rem);
        box-shadow: 0 24px 80px rgba(25, 51, 63, 0.12);
        text-align: center;
      }

      img {
        width: min(100%, 420px);
        height: auto;
        margin: 0 auto 2rem;
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--brand);
        font-weight: 700;
        font-size: 0.8rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 7vw, 5rem);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }

      p {
        margin: 1.2rem auto 0;
        max-width: 38rem;
        color: var(--muted);
        font-size: 1.06rem;
        line-height: 1.7;
      }

      .contact {
        margin-top: 2rem;
        display: grid;
        gap: 0.65rem;
      }

      .contact a {
        color: var(--ink);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
    <script type="application/ld+json">

        "telephone": "+420732356474",
        "taxID": "68239301",
        "vatID": "7703193663",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Luční 1802",
          "postalCode": "56501",
          "addressLocality": "Choceň",
          "addressCountry": "CZ"
        }
      }
    </script>
  </head>
  <body>
    <main>
      <section class="card">
